<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Career & Learning Roadmap Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <h1>Career Roadmap Generator</h1>
        </header>

  
        <form id="roadmapForm">
            <div class="form-group">
                <label for="ageInput">Age / Stage</label>
                <input type="number" name="age" id="ageInput" placeholder="e.g. 18" required min="1" max="120">
            </div>

            <div class="form-group">
                <label for="interestInput">Field of Interest</label>
                <select name="interest" id="interestInput">
                    <option value="Tech">Technology & Engineering</option>
                    <option value="Creative">Creative Arts & Design</option>
                    <option value="Business">Business & Management</option>
                </select>
            </div>

            <div class="form-group">
                <label for="levelInput">Experience Level</label>
                <select name="level" id="levelInput">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                </select>
            </div>

       
            <div class="form-group obstacle-bay">
                <label for="problemInput">Primary Learning Obstacle</label>
                <select name="problem" id="problemInput">
                    <option value="Confusion">Lack of Clear Direction (Confusion)</option>
                    <option value="Discipline">Procrastination & Routine (Discipline)</option>
                    <option value="Resources">Limited Material/Finances (Resources)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Launch Roadmap Compilation</button>
        </form>


        <main id="resultContainer" style="display: none;">
            <h2>Generated Learning Milestones</h2>
            
            <div class="roadmap-grid">
            
                <section class="roadmap-card" data-tier="foundations">
                    <h3>30-Day Goals <span>(Phase 01)</span></h3>
                    <ul id="list30"></ul>
                </section>
                
                <!-- Card 2: Application Tier -->
                <section class="roadmap-card" data-tier="application">
                    <h3>6-Month Goals <span>(Phase 02)</span></h3>
                    <ul id="list6"></ul>
                </section>
                
            
                <section class="roadmap-card" data-tier="mastery">
                    <h3>12-Month Goals <span>(Phase 03)</span></h3>
                    <ul id="list12"></ul>
                </section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
