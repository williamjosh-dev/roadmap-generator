<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Career & Learning Roadmap Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Career Roadmap Generator</h1>

        <form id="roadmapForm">
            <div class="form-group">
                <label for="ageInput">Age / Current Career Stage</label>
                <input type="number" name="age" id="ageInput" placeholder="e.g. 18" required min="1" max="120">
            </div>

            <div class="form-group">
                <label for="interestInput">Field of Interest</label>
                <select name="interest" id="interestInput">
                    <option value="Tech">Technology & Engineering</option>
                    <option value="Creative">Creative Arts & Design</option>
                    <option value="Business">Business & Management</option>
                </select>
            </div>

            <div class="form-group">
                <label for="levelInput">Current Experience Level</label>
                <select name="level" id="levelInput">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                </select>
            </div>

            <div class="form-group">
                <label for="problemInput">Primary Learning Obstacle</label>
                <select name="problem" id="problemInput">
                    <option value="Confusion">Lack of Clear Direction (Confusion)</option>
                    <option value="Discipline">Procrastination & Routine (Discipline)</option>
                    <option value="Resources">Limited Material/Finances (Resources)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Generate Roadmap</button>
        </form>

        <div id="resultContainer" style="display: none;">
            <h2>Generated Learning Milestones</h2>
            <div class="roadmap-grid">
                <div class="roadmap-card">
                    <h3>30-Day Goals (Foundations)</h3>
                    <ul id="list30"></ul>
                </div>
                <div class="roadmap-card">
                    <h3>6-Month Goals (Application)</h3>
                    <ul id="list6"></ul>
                </div>
                <div class="roadmap-card">
                    <h3>12-Month Goals (Mastery)</h3>
                    <ul id="list12"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed the script path syntax by removing the './' -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
